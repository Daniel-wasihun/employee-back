version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ems-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ems_db}
      POSTGRES_USER: ${DB_USER:-ems_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ems_user} -d ${DB_NAME:-ems_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ems-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-ems_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-ems_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-changeme_strong_password}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_at_least_32_chars_long_here_replace_me}
      - SERVER_PORT=8443
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/etc/ssl/certs/backend-cert.pem
      - SERVER_SSL_CERTIFICATE_KEY=/etc/ssl/certs/backend-key.pem
      # Clear legacy keystore variables to ensure PEM is used
      - SERVER_SSL_KEY_STORE=
      - SERVER_SSL_KEY_STORE_PASSWORD=
      - SERVER_SSL_KEY_STORE_TYPE=
      - SERVER_SSL_KEY_ALIAS=
    volumes:
      - ../frontend/nginx/ssl/cert.pem:/etc/ssl/certs/backend-cert.pem:ro
      - ../frontend/nginx/ssl/key.pem:/etc/ssl/certs/backend-key.pem:ro
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

volumes:
  pgdata:

networks:
  ems-network:
    external: true
