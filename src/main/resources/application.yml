spring:
  application:
    name: ems-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ems_db}}
    username: ${DB_USER:ems_user}
    password: ${DB_PASSWORD:changeme_strong_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8443}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    # Support for both Keystore (legacy) and PEM (modern)
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}
    # PEM support (Spring Boot 2.7+)
    certificate: ${SERVER_SSL_CERTIFICATE:}
    certificate-private-key: ${SERVER_SSL_CERTIFICATE_KEY:}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:default_dev_secret_key_must_be_at_least_32_characters_long}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.ems: DEBUG
    org.springframework.security: INFO
